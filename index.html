<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中文閱讀大挑戰 - 香港小一中文學習</title>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 與 Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
        .animate-next-btn { animation: pulse-ring 2s infinite; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif; 
            background-color: #FFFBF5;
            touch-action: manipulation;
        }
        .grid-bg {
            background-image: radial-gradient(#FFEDD5 2px, transparent 2px);
            background-size: 30px 30px;
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 靜態數據：加入圖示與趣味元素 ---
        const LESSON_DATA = {
            vocabulary: [
                { id: 1, word: '小狗', unit: '隻', icon: '🐶', options: ['隻', '條', '個', '件'] },
                { id: 2, word: '鉛筆', unit: '支', icon: '✏️', options: ['把', '支', '張', '本'] },
                { id: 3, word: '白雲', unit: '朵', icon: '☁️', options: ['片', '朵', '個', '座'] },
                { id: 4, word: '醫生', unit: '位', icon: '👨‍⚕️', options: ['個', '位', '隻', '條'] },
                { id: 5, word: '長裙', unit: '條', icon: '👗', options: ['條', '件', '雙', '把'] },
                { id: 6, word: '尺子', unit: '把', icon: '📏', options: ['把', '張', '支', '本'] },
                { id: 7, word: '大山', unit: '座', icon: '⛰️', options: ['座', '個', '位', '條'] },
                { id: 8, word: '襪子', unit: '雙', icon: '🧦', options: ['隻', '條', '雙', '個'] },
                { id: 9, word: '圖畫', unit: '張', icon: '🎨', options: ['本', '張', '把', '支'] },
                { id: 10, word: '外套', unit: '件', icon: '🧥', options: ['件', '條', '個', '雙'] }
            ],
            reading: {
                title: '我的校園一天',
                illustration: '🏫',
                content: `清晨，太陽公公露出了笑臉。我背起書包，開開心心地走進校園。校門口的校工叔叔對我點點頭，我大聲地說：「叔叔早晨！」\n\n第一節課是中文課，林老師教我們讀詩。大家讀得朗朗上口，就像一群快樂的小鳥。下課鐘聲響了，我和好朋友小明跑到操場上。操場真熱鬧！小朋友有的在玩捉迷藏，有的在跳繩，大家玩得滿頭大汗。\n\n吃過午飯後，我們來到圖書館。圖書館靜悄悄的，我選了一本繪本，坐在軟綿綿的地墊上認真地看。\n\n放學了，爸爸在校門口等我。我告訴爸爸，學校的生活真豐富，我明天還想再回來！`,
                questions: [
                    { id: 1, q: '故事發生在什麼時間？', options: ['晚上', '清晨', '深夜'], correct: 2 },
                    { id: 2, q: '誰在校門口對作者點點頭？', options: ['校工叔叔', '林老師', '小明'], correct: 1 },
                    { id: 3, q: '作者下課後在操場做什麼？', options: ['讀詩', '看繪本', '玩耍'], correct: 3 },
                    { id: 4, q: '圖書館的環境是怎樣的？', options: ['很熱鬧', '靜悄悄', '很擁擠'], correct: 2 },
                    { id: 5, q: '作者對學校生活的感覺是？', options: ['很豐富', '很辛苦', '很悶'], correct: 1 }
                ]
            }
        };

        // --- 視覺圖標組件 ---
        const Icons = {
            Home: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>,
            Star: () => <svg className="w-5 h-5 fill-yellow-400" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>,
            ArrowRight: () => <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>,
            FunIllustration: () => (
                <svg className="w-32 h-32 text-orange-400 animate-float" viewBox="0 0 200 200" fill="none">
                    <rect x="40" y="60" width="120" height="100" rx="10" fill="white" stroke="currentColor" strokeWidth="8"/>
                    <line x1="100" y1="60" x2="100" y2="160" stroke="currentColor" strokeWidth="8"/>
                    <circle cx="150" cy="40" r="20" fill="#FFD700"/>
                    <path d="M140 40 L160 40 M150 30 L150 50" stroke="white" strokeWidth="4"/>
                </svg>
            )
        };

        // --- 詞語大挑戰組件 ---
        const VocabularyModule = ({ onFinish, onUpdateScore }) => {
            const [currentIdx, setCurrentIdx] = useState(0);
            const [selected, setSelected] = useState(null);
            const [isCorrect, setIsCorrect] = useState(false);
            const item = LESSON_DATA.vocabulary[currentIdx];

            const handleAnswer = (opt) => {
                if (isCorrect) return;
                setSelected(opt);
                if (opt === item.unit) {
                    setIsCorrect(true);
                    onUpdateScore(10);
                } else {
                    setTimeout(() => setSelected(null), 800);
                }
            };

            const nextQuestion = () => {
                if (currentIdx < LESSON_DATA.vocabulary.length - 1) {
                    setCurrentIdx(prev => prev + 1);
                    setSelected(null);
                    setIsCorrect(false);
                } else {
                    onFinish();
                }
            };

            return (
                <div className="flex flex-col h-full animate-fadeIn" key={`vocab-q-${currentIdx}`}>
                    <div className="w-full bg-gray-200 h-3">
                        <div className="bg-orange-400 h-3 transition-all duration-500 rounded-r-full" style={{ width: `${((currentIdx + 1) / 10) * 100}%` }}></div>
                    </div>

                    <div className="p-6 space-y-6 flex-1 overflow-y-auto">
                        <div className="text-center space-y-4">
                            <span className="inline-block bg-orange-100 text-orange-700 px-6 py-1 rounded-full font-black shadow-sm">
                                任務 {currentIdx + 1} / 10
                            </span>
                            
                            <div className="flex flex-col items-center justify-center space-y-4">
                                <div className="text-8xl p-4 bg-white rounded-full shadow-lg border-4 border-orange-50 mb-2">
                                    {item.icon}
                                </div>
                                <div className={`w-full text-6xl font-black py-10 rounded-[3rem] border-4 shadow-xl transition-all ${isCorrect ? 'bg-green-100 border-green-400 text-green-700' : 'bg-white border-orange-100 text-orange-600'}`}>
                                    一（{isCorrect ? item.unit : (selected ? selected : '　')}）{item.word}
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            {item.options.map(opt => (
                                <button 
                                    key={opt}
                                    onClick={() => handleAnswer(opt)}
                                    className={`h-24 text-4xl font-black rounded-3xl border-4 transition-all shadow-md active:scale-90 ${
                                        selected === opt 
                                        ? (opt === item.unit ? 'bg-green-500 border-green-700 text-white' : 'bg-red-500 border-red-700 text-white')
                                        : 'bg-white border-orange-50 text-gray-700 hover:border-orange-200'
                                    } ${isCorrect && opt !== item.unit ? 'opacity-30' : ''}`}
                                >
                                    {opt}
                                </button>
                            ))}
                        </div>
                    </div>

                    {isCorrect && (
                        <div className="p-6 bg-white border-t-2 border-orange-50">
                            <button 
                                onClick={nextQuestion}
                                className="w-full bg-green-500 text-white py-6 rounded-full text-4xl font-black shadow-2xl flex items-center justify-center gap-4 animate-next-btn"
                            >
                                {currentIdx === 9 ? '完成大挑戰' : '下一關'}
                                <Icons.ArrowRight />
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        // --- 閱讀大挑戰組件 ---
        const ReadingModule = ({ onFinish, onUpdateScore }) => {
            const [currentIdx, setCurrentIdx] = useState(0);
            const [selected, setSelected] = useState(null);
            const [isCorrect, setIsCorrect] = useState(false);
            const story = LESSON_DATA.reading;
            const q = story.questions[currentIdx];

            const handleAnswer = (idx) => {
                if (isCorrect) return;
                setSelected(idx);
                if (idx + 1 === q.correct) {
                    setIsCorrect(true);
                    onUpdateScore(20);
                } else {
                    setTimeout(() => setSelected(null), 800);
                }
            };

            const nextQuestion = () => {
                if (currentIdx < story.questions.length - 1) {
                    setCurrentIdx(prev => prev + 1);
                    setSelected(null);
                    setIsCorrect(false);
                } else {
                    onFinish();
                }
            };

            return (
                <div className="flex flex-col h-full animate-fadeIn overflow-hidden" key={`read-q-${currentIdx}`}>
                    <div className="w-full bg-gray-200 h-3">
                        <div className="bg-green-500 h-3 transition-all duration-500 rounded-r-full" style={{ width: `${((currentIdx + 1) / 5) * 100}%` }}></div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6 space-y-6">
                        <div className="bg-white p-6 rounded-[2.5rem] border-4 border-green-50 shadow-md relative overflow-hidden">
                            <div className="absolute top-2 right-4 text-6xl opacity-20">{story.illustration}</div>
                            <h3 className="text-3xl font-black text-green-700 mb-4 flex items-center gap-2">
                                <span className="p-2 bg-green-100 rounded-xl">📚</span> {story.title}
                            </h3>
                            <div className="text-2xl leading-relaxed text-gray-700 whitespace-pre-wrap font-medium">{story.content}</div>
                        </div>

                        <div className="bg-white p-8 rounded-[3rem] border-8 border-orange-50 shadow-2xl space-y-6">
                            <span className="bg-orange-100 text-orange-700 px-6 py-1 rounded-full font-black text-lg">挑戰 {currentIdx + 1} / 5</span>
                            <h4 className="text-2xl font-black text-gray-800 leading-tight">{q.q}</h4>
                            <div className="space-y-4">
                                {q.options.map((opt, i) => (
                                    <button 
                                        key={i}
                                        onClick={() => handleAnswer(i)}
                                        className={`w-full p-6 rounded-3xl border-4 text-2xl font-black text-left flex justify-between items-center transition-all ${
                                            selected === i 
                                            ? (i + 1 === q.correct ? 'bg-green-500 border-green-700 text-white shadow-lg' : 'bg-red-500 border-red-700 text-white shadow-lg')
                                            : 'bg-white border-gray-100 text-gray-700 hover:border-green-200'
                                        } ${isCorrect && i + 1 !== q.correct ? 'opacity-30' : ''}`}
                                    >
                                        <span className="flex-1">{i + 1}. {opt}</span>
                                        <span className="text-3xl">
                                            {selected === i ? (i + 1 === q.correct ? '🏆' : '❌') : '⚪'}
                                        </span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    {isCorrect && (
                        <div className="p-6 bg-white border-t-2 border-green-50">
                            <button 
                                onClick={nextQuestion}
                                className="w-full bg-green-500 text-white py-6 rounded-full text-4xl font-black shadow-2xl flex items-center justify-center gap-4 animate-next-btn"
                            >
                                {currentIdx === 4 ? '完成任務！' : '下一關'}
                                <Icons.ArrowRight />
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        // --- 主應用程式 ---
        const App = () => {
            const [view, setView] = useState('landing');
            const [score, setScore] = useState(0);

            const updateScore = (val) => setScore(prev => prev + val);

            const MainMenu = () => (
                <div className="p-6 space-y-10 animate-fadeIn h-full overflow-y-auto grid-bg">
                    <div className="flex justify-between items-center py-6">
                        <div>
                            <h2 className="text-5xl font-black text-gray-800 tracking-tighter mb-2">中文閱讀</h2>
                            <h3 className="text-4xl font-black text-orange-500 tracking-tight">大挑戰！</h3>
                        </div>
                        <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border-4 border-orange-100 animate-float text-6xl">
                             🎨
                        </div>
                    </div>

                    <div className="grid gap-8">
                        <button onClick={() => setView('vocabulary')} className="flex items-center p-8 bg-blue-500 rounded-[3.5rem] text-white shadow-2xl active:scale-95 transition-all group border-b-8 border-blue-700">
                            <div className="bg-white p-5 rounded-[2rem] mr-6 text-5xl group-hover:rotate-12 transition-transform">🖍️</div>
                            <div className="text-left">
                                <div className="text-4xl font-black mb-1">詞語挑戰</div>
                                <div className="text-blue-100 text-xl font-bold">10 關趣味大搜查</div>
                            </div>
                        </button>
                        <button onClick={() => setView('reading')} className="flex items-center p-8 bg-green-500 rounded-[3.5rem] text-white shadow-2xl active:scale-95 transition-all group border-b-8 border-green-700">
                            <div className="bg-white p-5 rounded-[2rem] mr-6 text-5xl group-hover:rotate-12 transition-transform">📚</div>
                            <div className="text-left">
                                <div className="text-4xl font-black mb-1">故事挑戰</div>
                                <div className="text-green-100 text-xl font-bold">5 關智慧大考驗</div>
                            </div>
                        </button>
                    </div>

                    <div className="bg-white rounded-[3rem] p-8 border-8 border-orange-100 shadow-2xl flex items-center justify-between">
                        <div className="flex items-center gap-6">
                            <div className="text-6xl animate-pulse">🥇</div>
                            <div>
                                <div className="font-black text-gray-800 text-2xl mb-1">我的榮譽積分</div>
                                <div className="text-orange-500 font-black text-4xl">{score} 分</div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            if (view === 'landing') {
                return (
                    <div className="min-h-screen max-w-md mx-auto bg-white flex flex-col items-center justify-center p-8 text-center grid-bg relative overflow-hidden">
                        <div className="absolute top-10 left-4 text-6xl opacity-20">🌟</div>
                        <div className="absolute bottom-10 right-4 text-6xl opacity-20">🎈</div>
                        
                        <div className="mb-10 bg-white p-12 rounded-[4.5rem] shadow-2xl border-[16px] border-orange-200">
                            <Icons.FunIllustration />
                        </div>
                        
                        <div className="space-y-4 mb-16">
                            <h1 className="text-6xl font-black text-gray-800 tracking-tighter leading-none">中文閱讀</h1>
                            <h2 className="text-7xl font-black text-orange-500 tracking-tighter leading-none italic">大挑戰</h2>
                        </div>
                        
                        <p className="text-2xl text-gray-600 mb-16 font-black leading-relaxed">
                            小朋友，準備好成為<br/>
                            <span className="text-orange-500 bg-orange-100 px-4 py-1 rounded-xl">閱讀大英雄</span> 嗎？
                        </p>
                        
                        <button onClick={() => setView('home')} className="w-full bg-orange-500 text-white text-5xl font-black py-8 rounded-full shadow-2xl active:scale-95 transition-all ring-[12px] ring-orange-50 border-b-[12px] border-orange-700">
                            開始挑戰！
                        </button>
                    </div>
                );
            }

            return (
                <div className="min-h-screen max-w-md mx-auto bg-white flex flex-col shadow-2xl relative overflow-hidden border-x-4 border-gray-100">
                    {/* Header */}
                    <div className="flex items-center justify-between p-5 bg-white border-b-4 border-orange-50 sticky top-0 z-50">
                        <button onClick={() => setView('home')} className="p-3 text-orange-500 bg-orange-50 rounded-[1.5rem] shadow-sm active:scale-90">
                            <Icons.Home />
                        </button>
                        <h1 className="text-2xl font-black text-gray-800 tracking-tight">
                            中文閱讀大挑戰
                        </h1>
                        <div className="flex items-center gap-2 bg-yellow-100 px-4 py-2 rounded-full text-orange-700 font-black shadow-inner">
                            <Icons.Star />
                            <span>{score}</span>
                        </div>
                    </div>

                    <div className="flex-1 overflow-hidden bg-[#FFFBF5]">
                        {view === 'home' && <MainMenu />}
                        {view === 'vocabulary' && <VocabularyModule onFinish={() => setView('home')} onUpdateScore={updateScore} />}
                        {view === 'reading' && <ReadingModule onFinish={() => setView('home')} onUpdateScore={updateScore} />}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
